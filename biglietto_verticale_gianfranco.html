<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biglietto da Visita Digitale Verticale - L.C.I. INNOVATION (Sfondo Animato)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 3rem 1rem;
    position: relative;
    overflow-x: hidden;
}

/* ============================================
   SFONDO ANIMATO
   ============================================ */

.bg-animated {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    overflow: hidden;
    background: linear-gradient(160deg, #0a0a0a 0%, #12100a 50%, #0a0a0a 100%);
}

.bg-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.35;
}

.bg-glow-1 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #C9A227 0%, transparent 70%);
    top: -100px; left: -120px;
    animation: floatSlow1 22s ease-in-out infinite;
}

.bg-glow-2 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, #E4C158 0%, transparent 70%);
    bottom: -140px; right: -100px;
    animation: floatSlow2 26s ease-in-out infinite;
}

.bg-glow-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #A5811C 0%, transparent 70%);
    top: 45%; left: 50%;
    animation: floatSlow3 30s ease-in-out infinite;
    opacity: 0.2;
}

@keyframes floatSlow1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(60px, 80px) scale(1.15); }
}

@keyframes floatSlow2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-70px, -60px) scale(1.1); }
}

@keyframes floatSlow3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.25); }
}

/* Particelle dorate fluttuanti */
.bg-particle {
    position: absolute;
    width: 3px; height: 3px;
    background: #C9A227;
    border-radius: 50%;
    opacity: 0.5;
    animation: particleFloat linear infinite;
}

@keyframes particleFloat {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
    .bg-glow, .bg-particle { animation: none; }
}

.vcard {
    position: relative;
    z-index: 1;
}

.vcard {
    width: 100%;
    max-width: 380px;
    background: linear-gradient(180deg, #1a1a1a 0%, #232323 100%);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    border: 1px solid rgba(201,162,39,0.25);
}

/* HERO TOP */
/* BRAND HEADER - testo logo, sempre visibile */
.brand-header {
    padding: 20px 20px 10px 20px;
    text-align: center;
    background: linear-gradient(135deg, #0d0d0d 0%, #1f1f1f 100%);
}

.brand-wordmark {
    max-width: 220px;
    width: 80%;
    height: auto;
    object-fit: contain;
}

/* FASCIA DECORATIVA - dove la foto si sovrappone */
.decor-strip {
    position: relative;
    height: 55px;
    background:
        radial-gradient(circle at 30% 20%, rgba(201,162,39,0.35), transparent 60%),
        linear-gradient(135deg, #1f1f1f 0%, #232323 100%);
}

/* PHOTO */
.photo-wrapper {
    display: flex;
    justify-content: center;
    margin-top: -47px;
    position: relative;
    z-index: 2;
}

.profile-photo {
    width: 124px;
    height: 124px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 10%;
    border: 4px solid #C9A227;
    background: #333;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
}

/* INFO */
.info-block {
    text-align: center;
    padding: 14px 24px 0 24px;
}

.personal-name {
    font-size: 21px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 4px;
}

.role {
    font-size: 13px;
    color: #C9A227;
    font-weight: 600;
    margin-bottom: 4px;
}

.location-line {
    font-size: 11.5px;
    color: #9a9a9a;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
}

.location-line svg {
    width: 11px;
    height: 11px;
    stroke: #9a9a9a;
    fill: none;
}

/* BUTTON */
.button-wrapper {
    padding: 22px 24px 8px 24px;
}

.save-contact-btn {
    width: 100%;
    background: linear-gradient(135deg, #E4C158 0%, #C9A227 50%, #A5811C 100%);
    color: #1a1a1a;
    border: none;
    border-radius: 30px;
    padding: 14px 0;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 6px 16px rgba(201,162,39,0.35);
}

.save-contact-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(201,162,39,0.45);
}

.save-contact-btn:active {
    transform: translateY(0px);
}

.save-contact-btn svg {
    width: 16px;
    height: 16px;
    stroke: #1a1a1a;
    fill: none;
}

/* SOCIAL SECTION */
.social-section {
    padding: 20px 24px 28px 24px;
    text-align: center;
}

.social-title {
    font-size: 11px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    position: relative;
}

.social-title::before,
.social-title::after {
    content: "";
    display: inline-block;
    width: 26px;
    height: 1px;
    background: rgba(201,162,39,0.4);
    vertical-align: middle;
    margin: 0 10px;
}

.social-icons-row {
    display: flex;
    justify-content: center;
    gap: 16px;
}

.social-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(201,162,39,0.1);
    border: 1px solid rgba(201,162,39,0.3);
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
}

.social-icon:hover {
    background: #C9A227;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(201,162,39,0.4);
}

.social-icon svg {
    width: 19px;
    height: 19px;
    stroke: #C9A227;
    fill: none;
}

.social-icon:hover svg {
    stroke: #1a1a1a;
}

/* footer note */
.footer-note {
    text-align: center;
    font-size: 10px;
    color: #6a6a6a;
    padding-bottom: 22px;
    letter-spacing: 0.3px;
}

@media (max-width: 420px) {
    .vcard { max-width: 100%; }
}
</style>
</head>

<script>
function salvaContatto() {
    const nome = document.getElementById('userName').textContent.trim();
    const ruolo = document.getElementById('userRole').textContent.trim();
    const parti = nome.split(' ');
    const cognome = parti.length > 1 ? parti[parti.length - 1] : '';
    const primoNome = parti[0];

    // Dati di contatto - MODIFICA QUESTI VALORI per ogni commerciale
    const email = 'marco.rossi@lci-innovation.it';
    const telefono = '+39 347 123 4567';
    const azienda = 'L.C.I. INNOVATION';
    const sitoWeb = 'https://www.lci-innovation.it';

    const vCardData =
        'BEGIN:VCARD\n' +
        'VERSION:3.0\n' +
        'FN:' + nome + '\n' +
        'N:' + cognome + ';' + primoNome + ';;;\n' +
        'ORG:' + azienda + '\n' +
        'TITLE:' + ruolo + '\n' +
        'TEL;TYPE=CELL:' + telefono + '\n' +
        'EMAIL:' + email + '\n' +
        'URL:' + sitoWeb + '\n' +
        'END:VCARD';

    const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = nome.replace(/\s+/g, '_') + '.vcf';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

// ==========================================
// FUNZIONE PER PERSONALIZZARE IL BIGLIETTO
// ==========================================
function aggiornaBiglietto(nome, ruolo, location, fotoUrl) {
    document.getElementById('userName').textContent = nome;
    document.getElementById('userRole').textContent = ruolo;
    document.getElementById('userLocation').textContent = location;
    if (fotoUrl) {
        document.getElementById('userPhoto').src = fotoUrl;
    }
}
</script>
